<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tokenizer Visualizer</title>
  <style>
    .token { display: inline-block; margin: 2px; padding: 2px 6px; border-radius: 4px; background: #e0e0e0; }
    .punct { background: #ffd54f; }
  </style>
</head>
<body>
  <h2>Tokenizer Visualizer</h2>
  <textarea id="input" rows="4" cols="50" placeholder="Type your text here..."></textarea>
  <div id="tokens" style="margin-top: 16px;"></div>
  <script src="tokenizer.js"></script>
  <script>
    const input = document.getElementById('input');
    const tokensDiv = document.getElementById('tokens');
    function renderTokens() {
      const tokens = tokenize(input.value);
      tokensDiv.innerHTML = tokens.map(token => {
        const isPunct = /[^\w\s]/.test(token);
        return `<span class="token${isPunct ? ' punct' : ''}">${token}</span>`;
      }).join(' ');
    }
    input.addEventListener('input', renderTokens);
  </script>
</body>
</html>
